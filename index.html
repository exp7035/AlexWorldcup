<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teta World Cup</title>
    <style>
        /* Reset and Base TV-Optimized Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            height: 100vh;
            background-color: #050505; 
            background-image: radial-gradient(circle at 50% 50%, #111 0%, #050505 100%);
            color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            overflow: hidden; 
        }

        /* --- THE FLOATING ALEX.PNG --- */
        .floating-avatar {
            position: fixed;
            top: 0;
            left: 0;
            width: 15vw; /* Scales beautifully on any TV */
            max-width: 250px;
            z-index: 0; /* Sits behind the UI */
            pointer-events: none; /* CRITICAL: Allows clicks to pass through to buttons */
            opacity: 0.12; /* Subtle enough not to distract from the game */
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.1));
            animation: floatAround 25s infinite ease-in-out alternate;
        }

        @keyframes floatAround {
            0% { transform: translate(5vw, 10vh) rotate(-5deg) scale(1); }
            25% { transform: translate(75vw, 15vh) rotate(5deg) scale(1.05); }
            50% { transform: translate(80vw, 65vh) rotate(-2deg) scale(0.95); }
            75% { transform: translate(10vw, 75vh) rotate(8deg) scale(1.02); }
            100% { transform: translate(5vw, 10vh) rotate(-5deg) scale(1); }
        }

        /* --- HEADER & TITLE ANIMATIONS --- */
        header {
            text-align: center;
            padding: 1.5vh 0;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: 4.5vw; 
            margin: 0;
            font-weight: 900;
            background: linear-gradient(90deg, #ffd700, #ff8c00, #ffd700, #ff8c00);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 4s linear infinite, textGlow 3s ease-in-out infinite alternate;
            letter-spacing: 2px;
        }

        @keyframes shimmer {
            to { background-position: 200% center; }
        }

        @keyframes textGlow {
            from { filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.3)); }
            to { filter: drop-shadow(0 0 25px rgba(255, 140, 0, 0.6)); }
        }

        /* --- MAIN PLAYER AREA --- */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 0 2vw;
            min-height: 0; 
            position: relative;
            z-index: 1;
        }

        .player-container {
            flex: 1;
            width: 100%;
            background: #000;
            border-radius: 1vw;
            overflow: hidden;
            margin-bottom: 1.5vh;
            border: 2px solid #1f2937;
            animation: borderPulse 5s infinite ease-in-out;
        }

        @keyframes borderPulse {
            0%, 100% { box-shadow: 0 0 30px rgba(37, 99, 235, 0.15); border-color: #1f2937; }
            50% { box-shadow: 0 0 50px rgba(37, 99, 235, 0.35); border-color: #334155; }
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* --- BUTTONS & ENTRANCE ANIMATIONS --- */
        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.2vw;
            padding: 1vh 0 2vh 0;
            flex-shrink: 0;
        }

        button {
            font-size: 1.5vw; 
            padding: 1.5vh 2.5vw;
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(5px);
            color: #e2e8f0;
            border: 2px solid #334155;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-weight: bold;
            letter-spacing: 1px;
            opacity: 0;
            animation: slideUp 0.6s ease forwards;
        }

        /* Staggered entrance animation for buttons */
        button:nth-child(1) { animation-delay: 0.1s; }
        button:nth-child(2) { animation-delay: 0.15s; }
        button:nth-child(3) { animation-delay: 0.2s; }
        button:nth-child(4) { animation-delay: 0.25s; }
        button:nth-child(5) { animation-delay: 0.3s; }
        button:nth-child(6) { animation-delay: 0.35s; }
        button:nth-child(7) { animation-delay: 0.4s; }
        button:nth-child(8) { animation-delay: 0.45s; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        button:hover {
            background: rgba(37, 99, 235, 0.9);
            border-color: #60a5fa;
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4);
        }

        button.active {
            background: linear-gradient(135deg, #1d4ed8, #2563eb);
            border-color: #93c5fd;
            box-shadow: 0 0 25px rgba(37, 99, 235, 0.6);
            transform: translateY(-2px);
        }

        /* --- FOOTER --- */
        footer {
            text-align: center;
            padding: 1.2vh;
            background: rgba(17, 17, 17, 0.9);
            backdrop-filter: blur(5px);
            flex-shrink: 0;
            border-top: 1px solid #222;
            position: relative;
            z-index: 1;
        }

        footer p {
            margin: 0;
            font-size: 1.2vw;
        }

        footer a {
            color: #f87171;
            font-weight: bold;
            text-decoration: none;
            border-bottom: 2px dashed #f87171;
            padding: 0 5px;
            transition: all 0.2s ease;
        }
        
        footer a:hover {
            color: #fca5a5;
            text-shadow: 0 0 10px rgba(248, 113, 113, 0.5);
        }
    </style>
</head>
<body>

    <!-- The Floating Image -->
    <img src="alex.png" alt="" class="floating-avatar">

    <header>
        <h1>Teta World cup By Alex Bouchrouche</h1>
    </header>

    <main>
        <div class="player-container">
            <iframe id="video-player" 
                    src="https://embed.st/embed/admin/ppv-argentina-vs-egypt/1" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen" 
                    allowfullscreen>
            </iframe>
        </div>

        <nav class="controls">
            <button class="source-btn active" data-src="https://embed.st/embed/admin/ppv-argentina-vs-egypt/1">TSN English</button>
            <button class="source-btn" data-src="https://embed.st/embed/admin/ppv-argentina-vs-egypt/3">Fox</button>
            <button class="source-btn" data-src="https://dami-tv.pro/player/hls/?v=244&url=%2Fpapi%2Ftv%2Fdlhd%2F966%2Fplaylist.m3u8&name=Live">beIN Sport</button>
            <button class="source-btn" data-src="https://ntv.cx/embed?t=U3kvVGsxU1RSbFNVNzYraHQ0eDVFWktGeGVzQkNwSHdpdVRML1F2aWtWS09WdGRpWU9YS3RXcndiSXlDTFZjSWl1c210OUJIeDk5Ty92MEtvQ3JITnc9PQ~~">ITV</button>
            <button class="source-btn" data-src="https://vileembeds.pages.dev/embed/worldcup-1">PPV</button>
            <button class="source-btn" data-src="https://vileembeds.pages.dev/embed/telemund0-usa">Telemundo</button>
            <button class="source-btn" data-src="https://vileembeds.pages.dev/embed/fox4k-usa#player=clappr&autoplay=1">Fox 3</button>
            <button class="source-btn" data-src="https://vileembeds.pages.dev/embed/bbc-4k#player=clappr&autoplay=1">BBC 4k</button>
        </nav>
    </main>

    <footer>
        <p>If the website is down, use <a href="https://strm01.vip/?m=30716&lang=ar" target="_blank">Backup 1</a> or <a href="https://dami-tv.pro/watch/d2MvMjAyNi0wNy0wNy9hcmctZWd5" target="_blank">Backup 2</a></p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const player = document.getElementById('video-player');
            const buttons = document.querySelectorAll('.source-btn');

            buttons.forEach(button => {
                button.addEventListener('click', () => {
                    player.src = button.getAttribute('data-src');
                    buttons.forEach(btn => btn.classList.remove('active'));
                    button.classList.add('active');
                });
            });
        });
    </script>
</body>
</html>
